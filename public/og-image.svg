    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6B35" />
      <stop offset="1" stop-color="#E63946" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- mascot bubbles -->
  <g transform="translate(880,80)">
    <circle cx="60" cy="60" r="80" fill="#fff" stroke="#2D3047" stroke-width="6" />
    <circle cx="40" cy="50" r="14" fill="#2D3047" />
    <circle cx="80" cy="50" r="14" fill="#2D3047" />
    <path d="M40 80 Q60 95 80 80" stroke="#2D3047" stroke-width="6" fill="none" stroke-linecap="round" />
  </g>
  <g transform="translate(1000,260)">
    <circle cx="50" cy="50" r="60" fill="#9B5DE5" stroke="#2D3047" stroke-width="6" />
    <circle cx="35" cy="42" r="9" fill="#fff" />
    <circle cx="65" cy="42" r="9" fill="#fff" />
    <circle cx="35" cy="42" r="4" fill="#2D3047" />
    <circle cx="65" cy="42" r="4" fill="#2D3047" />
