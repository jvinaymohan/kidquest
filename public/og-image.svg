  <text x="80" y="220" font-family="'Baloo 2', sans-serif" font-size="140" font-weight="800" fill="url(#title)">KidQuest</text>
  <text x="80" y="290" font-family="Nunito, sans-serif" font-size="40" font-weight="700" fill="#2D3047">A joyful learning adventure</text>
  <text x="80" y="345" font-family="Nunito, sans-serif" font-size="30" font-weight="700" fill="#2D3047" opacity="0.7">for kids ages 414 " 6 subjects " 90 lessons</text>

